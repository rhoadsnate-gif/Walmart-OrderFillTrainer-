name: Build APK Factory

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      # ✅ FORCE CREATE ICON (NO MORE ERRORS EVER)
      - name: Create fallback icon
        run: |
          convert -size 512x512 xc:blue icon.png

      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -o godot.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -o templates.tpz -d templates
          cp -r templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Create debug keystore
        run: |
          keytool -keyalg RSA -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore debug.keystore \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create export preset
        run: |
          cat > export_presets.cfg <<'EOF'
[preset.0]
name="Android"
platform="Android"
runnable=true
export_filter="all_resources"
export_path="build/game.apk"

[preset.0.options]
package/unique_name="com.rhoadsnate.orderfilltrainer"
package/name="OrderFill Trainer"
package/signed=true
launcher_icons/main_192x192="res://icon.png"
launcher_icons/adaptive_foreground_432x432="res://icon.png"
launcher_icons/adaptive_background_432x432="res://icon.png"
architectures/arm64-v8a=true
keystore/debug="debug.keystore"
keystore/debug_user="androiddebugkey"
keystore/debug_password="android"
EOF

      - name: Fix permissions
        run: |
          mkdir -p .godot/editor
          chmod -R 777 .

      - name: Build APK
        run: |
          mkdir -p build
          ./Godot_v4.2.2-stable_linux.x86_64 \
          --headless \
          --path . \
          --export-debug "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OrderFillTrainer-APK
          path: build/game.apk
