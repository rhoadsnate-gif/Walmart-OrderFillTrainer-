name: Build APK Factory

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -o Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -o Godot_v4.2.2-stable_export_templates.tpz -d templates
          cp -r templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Clean project cache
        run: |
          rm -rf .godot
          rm -rf .import
          rm -f icon.png.import
          rm -f assets/icon.png.import
          mkdir -p .godot/editor
          if [ -f project.godot ]; then sed -i '/config\/icon/d' project.godot; fi
          chmod -R 777 .

      - name: Create debug keystore
        run: |
          keytool -genkeypair -v \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create export preset
        run: |
          printf '%s\n' \
          '[preset.0]' \
          '' \
          'name="Android"' \
          'platform="Android"' \
          'runnable=true' \
          'dedicated_server=false' \
          'custom_features=""' \
          'export_filter="all_resources"' \
          'include_filter=""' \
          'exclude_filter=""' \
          'export_path="build/game.apk"' \
          'encryption_include_filters=""' \
          'encryption_exclude_filters=""' \
          'encrypt_pck=false' \
          'encrypt_directory=false' \
          '' \
          '[preset.0.options]' \
          '' \
          'custom_template/debug=""' \
          'custom_template/release=""' \
          'gradle_build/use_gradle_build=false' \
          'gradle_build/export_format=0' \
          'architectures/armeabi-v7a=false' \
          'architectures/arm64-v8a=true' \
          'architectures/x86=false' \
          'architectures/x86_64=false' \
          'version/code=1' \
          'version/name="1.0"' \
          'package/unique_name="com.rhoadsnate.orderfilltrainer"' \
          'package/name="OrderFill Trainer"' \
          'package/signed=true' \
          'launcher_icons/main_192x192=""' \
          'launcher_icons/adaptive_foreground_432x432=""' \
          'launcher_icons/adaptive_background_432x432=""' \
          'screen/immersive_mode=true' \
          'screen/support_small=true' \
          'screen/support_normal=true' \
          'screen/support_large=true' \
          'screen/support_xlarge=true' \
          'permissions/custom_permissions=PackedStringArray()' \
          'keystore/debug="debug.keystore"' \
          'keystore/debug_user="androiddebugkey"' \
          'keystore/debug_password="android"' \
          'keystore/release=""' \
          'keystore/release_user=""' \
          'keystore/release_password=""' \
          > export_presets.cfg

      - name: Build APK
        run: |
          mkdir -p build
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --verbose --path . --export-debug "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OrderFillTrainer-APK
          path: build/game.apk
