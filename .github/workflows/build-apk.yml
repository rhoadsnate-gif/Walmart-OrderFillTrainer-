yaml
name: Build APK Factory 

on:
  push:
  workflow_dispatch: 

env:
  GODOT_VERSION: 4.3-stable
  GODOT_TEMPLATES_DIR: 4.3.stable 

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17" 

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3 

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip python3-pip
          python3 -m pip install --upgrade Pillow 

      - name: Download Godot $`{{ env.GODOT_VERSION }}
        run: |
          wget -q -O godot.zip "https://github.com/godotengine/godot/releases/download/`${GODOT_VERSION}/Godot_v$`{GODOT_VERSION}_linux.x86_64.zip"
          unzip -o godot.zip
          mv "Godot_v`${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          ./godot --version 

      - name: Download Android export templates
        run: |
          mkdir -p "$`HOME/.local/share/godot/export_templates/`${GODOT_TEMPLATES_DIR}"
          wget -q -O templates.tpz "https://github.com/godotengine/godot/releases/download/$`{GODOT_VERSION}/Godot_v`${GODOT_VERSION}_export_templates.tpz"
          unzip -o templates.tpz -d templates_extract
          cp -r templates_extract/templates/* "$`HOME/.local/share/godot/export_templates/`${GODOT_TEMPLATES_DIR}/" 

      - name: Generate Walmart-style icon (valid PNG)
        run: |
          python3 - <<'PY'
          import math, os
          from PIL import Image, ImageDraw 

          SIZE = 512
          BLUE   = (0, 113, 206, 255)
          YELLOW = (255, 194, 32, 255) 

          img = Image.new("RGBA", (SIZE, SIZE), BLUE)
          d = ImageDraw.Draw(img) 

          cx, cy = SIZE / 2, SIZE / 2
          outer_r = SIZE * 0.34
          inner_r = SIZE * 0.07
          spokes = 6 

          pts = []
          for i in range(spokes * 2):
              angle = (math.pi * i) / spokes - math.pi / 2
              r = outer_r if i % 2 == 0 else inner_r
              pts.append((cx + math.cos(angle) * r, cy + math.sin(angle) * r))
          d.polygon(pts, fill=YELLOW) 

          rr = SIZE * 0.05
          d.ellipse([cx - rr, cy - rr, cx + rr, cy + rr], fill=YELLOW) 

          img.save("icon.png", "PNG")
          os.makedirs("assets", exist_ok=True)
          img.save("assets/icon.png", "PNG")
          print("Generated valid PNG icons")
          PY 

      - name: Prepare project files
        run: |
          rm -rf .godot .import
          find . -name "*.png.import" -delete 

          mkdir -p scripts 

          if [ ! -f project.godot ]; then
            cat > project.godot <<'EOF'
          ; Engine configuration file.
          config_version=5 

          [application]
          config/name="OrderFill Trainer"
          run/main_scene="res://main.tscn"
          config/features=PackedStringArray("4.3")
          config/icon="res://icon.png"
          EOF
          fi 

          if [ ! -f main.tscn ]; then
            cat > main.tscn <<'EOF'
          [gd_scene load_steps=2 format=3] 

          [ext_resource type="Script" path="res://scripts/Main.gd" id="1"] 

          [node name="Main" type="Node3D"]
          script = ExtResource("1")
          EOF
          fi 

          if [ ! -f scripts/Main.gd ]; then
            cat > scripts/Main.gd <<'EOF'
          extends Node3D 

          func _ready():
              print("OrderFill Trainer started")
          EOF
          fi 

          if ! grep -q 'config/icon' project.godot; then
            echo 'config/icon="res://icon.png"' >> project.godot
          fi 

      - name: Create debug keystore
        run: |
          keytool -genkeypair -v \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore "$`GITHUB_WORKSPACE/debug.keystore" \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "DEBUG_KEYSTORE=`$GITHUB_WORKSPACE/debug.keystore" >> "$`GITHUB_ENV" 

      - name: Configure Godot editor settings
        run: |
          ES_DIR="`$HOME/.config/godot"
          mkdir -p "$`ES_DIR"
          cat > "`$ES_DIR/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3] 

          [resource]
          export/android/android_sdk_path = "$`{ANDROID_SDK_ROOT}"
          export/android/debug_keystore = "`${DEBUG_KEYSTORE}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          EOF 

      - name: Create export preset
        run: |
          cat > export_presets.cfg <<'EOF'
          [preset.0] 

          name="Android"
          platform="Android"
          runnable=true
          dedicated_serv
