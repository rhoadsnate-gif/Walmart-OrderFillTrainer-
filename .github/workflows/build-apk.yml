name: Build APK Factory

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -o godot.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64

      - name: Download Android export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -o templates.tpz -d templates
          cp -r templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Create clean icon
        run: |
          rm -f icon.png
          python3 - <<'PY'
          from PIL import Image, ImageDraw
          img = Image.new("RGBA", (512, 512), (0, 90, 220, 255))
          d = ImageDraw.Draw(img)
          d.rounded_rectangle((20, 20, 492, 492), radius=90, fill=(0, 110, 255, 255))
          d.rectangle((150, 270, 330, 360), fill=(255, 255, 255, 255))
          d.rectangle((325, 205, 370, 360), fill=(20, 35, 60, 255))
          d.rectangle((360, 330, 470, 355), fill=(255, 205, 30, 255))
          d.rectangle((405, 250, 475, 325), fill=(255, 205, 30, 255))
          d.ellipse((155, 345, 215, 405), fill=(15, 25, 45, 255))
          d.ellipse((275, 345, 335, 405), fill=(15, 25, 45, 255))
          d.rectangle((210, 235, 260, 285), fill=(15, 25, 45, 255))
          img.save("icon.png")
          PY

      - name: Create debug keystore
        run: |
          keytool -keyalg RSA -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore debug.keystore \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create Android export preset
        run: |
          cat > export_presets.cfg <<'EOF'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/gradle_build_directory=""
          gradle_build/android_source_template=""
          gradle_build/compress_native_libraries=false
          gradle_build/export_format=0
          gradle_build/min_sdk=""
          gradle_build/target_sdk=""
          architectures/armeabi-v7a=false
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          version/code=1
          version/name="1.0"
          package/unique_name="com.rhoadsnate.orderfilltrainer"
          package/name="OrderFill Trainer"
          package/signed=true
          package/app_category=2
          launcher_icons/main_192x192="res://icon.png"
          launcher_icons/adaptive_foreground_432x432="res://icon.png"
          launcher_icons/adaptive_background_432x432="res://icon.png"
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          permissions/custom_permissions=PackedStringArray()
          permissions/internet=false
          permissions/vibrate=false
          permissions/wake_lock=false
          keystore/debug="debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          EOF

      - name: Fix permissions
        run: |
          mkdir -p .godot/editor
          chmod -R 777 .

      - name: Build APK
        run: |
          mkdir -p build
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --path "$GITHUB_WORKSPACE" --export-debug "Android" "$GITHUB_WORKSPACE/build/game.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OrderFillTrainer-APK
          path: build/game.apk
